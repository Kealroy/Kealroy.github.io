<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TCL Admin Login</title>

    <link rel="stylesheet" href="../css/home.css">

</head>

<body>

<header class="site-header">

    <nav class="navbar">

        <a href="../index.html" class="logo">
            🚛 <span>TCL</span> TruckersMP Cash League
        </a>

        <button id="menuToggle" class="menu-toggle">
            ☰
        </button>

        <ul id="navMenu" class="nav-menu">

            <li><a href="../index.html">Home</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="seasons.html">Seasons</a></li>
            <li><a href="rules.html">Rules</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="admin-login.html" class="admin-link">Admin</a></li>

        </ul>

    </nav>

</header>

<section class="hero">

    <div class="container">

        <div class="hero-content">

            <h1>🔒 Administrator Login</h1>

            <p>
                Only authorised TCL administrators can access the dashboard.
            </p>

        </div>

    </div>

</section>

<section>

    <div class="container">

        <div class="hero-card" style="max-width:500px;margin:auto;">

            <h2>Administrator Login</h2>

            <form id="adminLoginForm">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your admin email"
                    required>

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>

                <button
                    type="submit"
                    class="btn btn-primary"
                    style="width:100%;margin-top:20px;">

                    Login

                </button>

            </form>

            <p
                id="message"
                style="margin-top:20px;text-align:center;font-weight:bold;">
            </p>

        </div>

    </div>

</section>

<footer>

    <div class="footer-bottom">

        © 2026 TCL TruckersMP Cash League

    </div>

</footer>

<script src="../js/menu.js"></script>

<script type="module" src="../js/admin-login.js"></script>

</body>

</html>
